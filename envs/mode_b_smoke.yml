name: trace-runner
channels:
  - conda-forge
dependencies:
  - python=3.10
  - pip

  # Core data processing
  - numpy>=1.24,<2
  - pandas>=2.0,<3
  - scipy

  # Clustering and hyperparameter search
  - scikit-learn>=1.2,<1.4
  - optuna
  - kneed

  # Analysis, plotting, and artifact checks
  - matplotlib
  - pyyaml
  - jsonschema
  - pyarrow
  - openpyxl
  - statsmodels
  - tqdm